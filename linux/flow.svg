<?xml version="1.0" encoding="UTF-8"?>
<!-- flow icon: a green focus-spiral on a dark rounded square. Scalable SVG so it
     renders crisply at any size in app menus / AppImage thumbnails. -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="56" fill="#0f1410"/>
  <g fill="none" stroke="#3ddc84" stroke-width="16" stroke-linecap="round">
    <!-- inward spiral suggesting "flow" / focus -->
    <path d="M128 40
             a88 88 0 1 1 -62 150
             a64 64 0 1 1 90 -90
             a40 40 0 1 1 -56 56
             a18 18 0 1 1 26 -26"/>
  </g>
  <circle cx="128" cy="128" r="10" fill="#3ddc84"/>
</svg>
