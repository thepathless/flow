name: Release

# Triggered when you push a version tag (e.g. `git tag v1.0.0 && git push --tags`).
# Builds the foolproof AppImage + Python wheel/sdist and attaches them to a new
# GitHub Release.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build AppImage (bundles its own Python)
        run: |
          cd linux/appimage
          ./build-appimage.sh
        # No FUSE needed: the script uses --appimage-extract / -extract-and-run.

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            flow-*.AppImage
            dist/*.whl
            dist/*.tar.gz
